<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Paris Metro Quizz - Entraînement RATP</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Paris Metro Quizz</h1>
        <nav>
            <a href="index.html">Accueil</a>
        </nav>
    </header>
    <main>
        <div id="setup-container">
            <h2>Configuration du Quizz</h2>
            <p>Révisez le réseau RATP pour vos trajets :</p>
            <select id="lignes_ou_stations" name="lignes_ou_stations">
                <option value="lignes">Lignes</option>
                <option value="stations">Stations</option>
            </select>
            <button id="btn-start">Commencer le Quizz</button>
        </div>
        
        <div id="quiz-container" class="hidden">
            <h2 id="question-title">Question</h2>
            <p id="question-text"></p>
            <div id="options-container"></div>
            <p id="feedback"></p>
            <button id="btn-next" class="hidden">Question Suivante</button>
        </div>
        
        <div id="score-container" class="hidden">
            <h2>Fin du jeu !</h2>
            <p id="final-score"></p>
            <button id="btn-restart">Rejouer</button>
        </div>
    </main>
    <footer>
        <p>Créé pour mémoriser les stations, correspondances et lignes d'Île-de-France !</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
