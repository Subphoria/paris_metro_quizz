<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Île-de-France Mobilités - Quizz Métro</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Métro Quizz</h1>
            <nav>
                <a href="index.html">Accueil</a>
            </nav>
        </div>
    </header>
    <main>
        <div id="setup-container" class="card">
            <h2>Configuration de la partie</h2>
            <p>Testez vos connaissances sur le réseau francilien :</p>
            <select id="lignes_ou_stations" name="lignes_ou_stations">
                <option value="lignes">Questions sur les Lignes</option>
                <option value="stations">Questions sur les Stations</option>
            </select>
            <button id="btn-start" class="btn-primary">Commencer l'entraînement</button>
        </div>
        
        <div id="quiz-container" class="card hidden">
            <div id="entity-header"></div>
            <h2 id="question-text"></h2>
            
            <div id="options-container"></div>
            
            <div class="action-bar">
                <button id="btn-validate" class="btn-primary hidden">Valider mon choix</button>
            </div>
            
            <p id="feedback"></p>
            <button id="btn-next" class="btn-secondary hidden">Question Suivante</button>
        </div>
        
        <div id="score-container" class="card hidden">
            <h2>Bilan de votre trajet !</h2>
            <p id="final-score" class="score-display"></p>
            
            <div id="recap-container"></div>
            
            <button id="btn-restart" class="btn-primary mt-2">Refaire une partie</button>
        </div>
    </main>
    <footer>
        <p>Créé pour mémoriser le réseau Île-de-France Mobilités & RATP.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
